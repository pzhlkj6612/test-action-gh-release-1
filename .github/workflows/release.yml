# Minimal workflow to demonstrate https://github.com/softprops/action-gh-release/issues/713
# At v2.5.0, the output `assets` URLs contain "untagged-<hex>" instead of the actual tag.

name: Release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - {repo: 'softprops/action-gh-release', action-gh-release-tag: 'v2.4.2', check-url: '0'}
          - {repo: 'softprops/action-gh-release', action-gh-release-tag: 'v2.5.0', check-url: '1'}
          - {repo: 'pzhlkj6612/forked-action-gh-release', action-gh-release-tag: 'copilot/fix-asset-url-generation', check-url: '1'}
    steps:
      - name: Use ${{ matrix.repo }}@${{ matrix.action-gh-release-tag }}
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.repo }}
          ref: ${{ matrix.action-gh-release-tag }}

      - name: Sleep and Create a dummy release asset
        run: |
          sleep $(( ( RANDOM % 10 ) + 1 ))
          echo "hello" > asset.txt

      - name: Create Release
        id: release
        uses: ./
        with:
          name: Release from ${{ matrix.repo }}@${{ matrix.action-gh-release-tag }}
          files: asset.txt

      - name: Show and check output asset URLs
        env:
          ASSETS: ${{ steps.release.outputs.assets }}
          CHECK_URL: ${{ matrix.check-url }}
        run: |
          set -u

          echo "$ASSETS" | jq .

          if [[ '0' = "$CHECK_URL" ]]; then
            exit 0
          fi

          echo ""
          echo "Expected URL pattern: .../releases/download/${{ github.ref_name }}/asset.txt"
          echo "If the URL above contains 'untagged-' instead of the tag name, the bug is present."

          browser_download_url="$( echo "$ASSETS" | jq --raw-output '.[0].browser_download_url' )"

          echo "$browser_download_url" | grep -P 'untagged-[a-z0-9]{20}'
          if echo "$browser_download_url" | grep -P 'untagged-[a-z0-9]{20}'; then
            echo "::error title=Wrong 'browser_download_url'::$browser_download_url"
            exit 1
          fi

          exit 0
