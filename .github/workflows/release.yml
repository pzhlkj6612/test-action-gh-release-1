# Minimal workflow to demonstrate https://github.com/softprops/action-gh-release/issues/713
# After v2.5.0, the output `assets` URLs contain "untagged-<hex>" instead of the actual tag,
# because the assets output is captured while the release is still a draft.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - action-gh-release-tag: 'v2.4.2'
            check-url: '0'
          - action-gh-release-tag: 'v2.5.0'
            check-url: '1'
    steps:
      - name: Use softprops/action-gh-release@${{ matrix.action-gh-release-tag }}
        uses: actions/checkout@v6
        with:
          repository: softprops/action-gh-release
          ref: ${{ matrix.action-gh-release-tag }}

      - name: Sleep and Create a dummy release asset
        run: |
          sleep $(( ( RANDOM % 10 ) + 1 ))
          echo "hello" > asset.txt

      - name: Create Release
        id: release
        uses: ./
        with:
          name: Release from ${{ matrix.action-gh-release-tag }}
          files: asset.txt

      - name: Show and check output asset URLs
        env:
          ASSETS: ${{ steps.release.outputs.assets }}
          CHECK_URL: ${{ matrix.check-url }}
        run: |
          echo "assets output:"
          echo "$ASSETS" | jq .
          echo ""
          echo "Expected URL pattern: .../releases/download/${{ github.ref_name }}/asset.txt"
          echo "If the URL above contains 'untagged-' instead of the tag name, the bug is present."

          browser_download_url="$( echo "$ASSETS" | jq --raw-output '.[0].browser_download_url' )"

          if [[ '1' = "$CHECK_URL" ]]; then
            echo "$browser_download_url" | grep -P 'untagged-[a-z0-9]{20}'
            if [[ '0' = "$?" ]]; then
              echo "::error title=Wrong 'browser_download_url'::$browser_download_url"
              exit 1
            fi
          fi
